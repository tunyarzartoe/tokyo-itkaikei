<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フォームバリデーションの練習</title>
</head>
<body style="background-color: #f0f0f0; padding: 20px;">
    <form action="#"   method="post" style="max-width: 400px; margin: 0 auto; background-color: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);">
        <label for="email">メールアドレス:</label>
        <input type="email" id="email" name="email" required maxlength="5">
        <button type="submit">送信</button>
    </form>
</body>
</html>
