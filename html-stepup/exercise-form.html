<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アルバイト応募フォーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #f3f6ff 0%, #eef2f7 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #1f2937;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .form-card {
            width: 100%;
            max-width: 500px;
            background-color: #ffffff;
            border-radius: 22px;
            padding: 36px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12);
            border: 1px solid rgba(148, 163, 184, 0.18);
        }

        .form-card h1 {
            font-size: 28px;
            margin-bottom: 24px;
            color: #0f172a;
            text-align: center;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label,
        .field-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            background-color: #f8fafc;
            font-size: 15px;
            color: #0f172a;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.14);
            background-color: #ffffff;
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }

        .radio-group label {
            font-weight: 500;
            color: #475569;
        }

        input[type="radio"],
        input[type="checkbox"] {
            accent-color: #4f46e5;
            margin-right: 8px;
            vertical-align: middle;
        }

        .checkbox-field {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #475569;
            font-size: 14px;
        }

        .submit-button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(59, 130, 246, 0.24);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .submit-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 28px rgba(59, 130, 246, 0.28);
        }

        .submit-button:active {
            transform: translateY(0);
        }

        @media (max-width: 540px) {
            .form-card {
                padding: 28px 20px;
            }

            .form-card h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <form class="form-card" action="#" method="post">
        <h1>アルバイト応募フォーム</h1>

        <div class="form-group">
            <label for="name">お名前</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
            <label for="email">メールアドレス</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
            <span class="field-label">性別</span>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="male" required>男性</label>
                <label><input type="radio" name="gender" value="female">女性</label>
            </div>
        </div>

        <div class="form-group">
            <label for="occupation">現在のご職業</label>
            <select id="occupation" name="occupation" required>
                <option value="">選択してください</option>
                <option value="student">学生</option>
                <option value="unemployed">無職</option>
                <option value="other">その他</option>
            </select>
        </div>

        <div class="form-group">
            <label for="pr">自己PR</label>
            <textarea id="pr" name="pr" rows="5" required></textarea>
        </div>

        <div class="form-group checkbox-field">
            <input type="checkbox" id="privacy" name="privacy" required>
            <label for="privacy">プライバシーポリシーに同意する</label>
        </div>

        <button class="submit-button" type="submit">送信</button>
    </form>
</body>

</html>
