<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>セルの結合</title>
</head>

<body style="background-color: #f0f0f0; padding: 20px;">
    <table border="1" style="width: 50%; margin: 0 auto; background-color: white; border-collapse: collapse;">
        <caption>横に結合したセル</caption>
        <tr>
            <td colspan="2" style="text-align: center; font-weight: bold;">社員情報</td>
        </tr>
        <tr>
            <td>名前</td>
            <td>年齢</td>
        </tr>
        <tr>
            <td>田中</td>
            <td>25</td>
        </tr>
        <tr>
            <td>佐藤</td>
            <td>30</td>
        </tr>
        <tr>
            <td>梅村</td>
            <td>35</td>
        </tr>
    </table>

    <table border="1" style="width: 50%; margin: 0 auto; background-color: white; border-collapse: collapse;">
        <caption>縦に結合したセル</caption>
        <tr>
            <td rowspan="2" style="text-align: center; font-weight: bold;">部署</td>
            <td>営業部</td>
        </tr>
        <tr>
            <td>技術部</td>
        </tr>
    </table>
</body>

</html>
