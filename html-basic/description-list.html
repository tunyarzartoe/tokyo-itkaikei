<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>説明リストの練習</title>
    <style>
        dt {
            font-weight: bold;
            font-size: larger;
            font-family: Georgia, 'Times New Roman', Times, serif;
        }
    </style>
</head>

<body>
    <!-- dl タグは、説明リストを作成するためのHTMLタグです。説明リストは、用語とその定義を組み合わせて表示するためのリスト形式の一種です。説明リストは、dtタグとddタグを使用して構成されます。
     dt タグは定義用の用語を表し、ddタグはその定義を表します。dlタグはdtタグとddタグをまとめるためのコンテナ要素です。
     dd タグは、dtタグで定義された用語の説明や定義を提供するために使用されます。ddタグは、dtタグの直後に配置され、dtタグで定義された用語に関連する情報を提供します。ddタグは、通常、インデントされて表示され、dtタグと区別されるようになっています。
     例えば、以下のように使用されます。 -->
    <dl>
        <dl
            style="width: auto; font: optional;font-size: 20px; text-align: left; color: #000000; background-color: #ffffff; margin: 0; padding: 0;">
            <dt>HTML</dt>
            <dd>HyperText Markup Languageの略で、ウェブページを作成するための言語です。</dd>
            <dt>CSS</dt>
            <dd>Cascading Style Sheetsの略で、ウェブページの見た目を装飾するための言語です。</dd>
            <dt>JavaScript</dt>
            <dd>ウェブページに動きをつけるためのプログラミング言語です。</dd>
        </dl>
</body>

</html>
