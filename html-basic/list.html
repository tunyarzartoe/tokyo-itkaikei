<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リストの練習</title>
</head>
<body>
    <ul><!-- 順序なしリスト 　unordered list-->
        <li>🍊ミカン</li>
        <li>🍌バナナ</li>
        <li>🍊オレンジ</li>
    </ul>
    <ol><!-- 順序ありリスト 　ordered list -->
        <li>項目A</li>
        <li>項目B</li>
        <li>項目C</li>
    </ol>
</body>
</html>
